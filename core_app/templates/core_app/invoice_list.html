<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invoices</title>
</head>
<body>
    <h1>My Invoices</h1>

    <ul>
        {% for invoice in invoices %}
            <li>
                {{ invoice.createdAt }} - {{ invoice.id }} - {{ invoice.totalAmount }} - {{ invoice.status }}
            </li>
        {% empty %}
            <li>No invoices found.</li>
        {% endfor %}
    </ul>

    <p><a href="{% url 'core_app:patient_dashboard' %}">Back to dashboard</a></p>
</body>
</html>

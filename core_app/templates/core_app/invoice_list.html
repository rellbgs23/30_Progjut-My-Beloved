<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Invoices</title>
    <style>
        body{font-family:Inter, system-ui, -apple-system, Roboto, Arial;margin:0;background:#f4f7f9;color:#071124}
        .wrap{max-width:980px;margin:28px auto;padding:18px}
        .card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 12px 40px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eef4f4}
        th{color:#6b7280;font-weight:600}
        .status-paid{color:green;font-weight:700}
        .status-unpaid{color:#b45309;font-weight:700}
        a.btn{display:inline-block;padding:8px 12px;background:#0f766e;color:#fff;border-radius:8px;text-decoration:none}
        @media(max-width:720px){table,thead,tbody,th,td,tr{display:block} th{display:none} td{padding:10px 0;border-bottom:0} td:before{content:attr(data-label);display:block;color:#6b7280;font-size:0.95rem}}
    </style>
</head>
<body>
    <div class="wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h1>My Invoices</h1>
            <a class="btn" href="{% url 'core_app:patient_dashboard' %}">Back to dashboard</a>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr><th>Date</th><th>Invoice #</th><th>Total</th><th>Status</th></tr>
                </thead>
                <tbody>
                    {% for invoice in invoices %}
                        <tr>
                            <td data-label="Date">{{ invoice.createdAt }}</td>
                            <td data-label="Invoice">{{ invoice.id }}</td>
                            <td data-label="Total">{{ invoice.totalAmount }}</td>
                            <td data-label="Status">
                                {% if invoice.status == 'PAID' %}
                                    <span class="status-paid">{{ invoice.status }}</span>
                                {% else %}
                                    <span class="status-unpaid">{{ invoice.status }}</span>
                                {% endif %}
                            </td>
                        </tr>
                    {% empty %}
                        <tr><td colspan="4">No invoices found.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

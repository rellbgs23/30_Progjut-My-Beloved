<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
</head>
<body>
    <h1>My Appointments</h1>
    <ul>
        {% for appointment in appointments %}
            <li>
                {{ appointment.scheduledAt }} - Dr. {{ appointment.doctor.name }} - {{ appointment.status }}
            </li>
        {% empty %}
            <li>No appointments found.</li>
        {% endfor %}
    </ul>
    <p><a href="{% url 'core_app:patient_dashboard' %}">Back to dashboard</a></p>
</body>
</html>

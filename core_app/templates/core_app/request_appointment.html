{% extends "base.html" %}

{% block title %}Request Appointment - MediCore HIS{% endblock %}

{% block page_header %}
<section class="page-header">
    <p class="eyebrow">Patient Portal</p>
    <h1 class="page-title">Request Appointment</h1>
    <p class="page-subtitle">Choose a doctor and submit your preferred appointment time.</p>
</section>
{% endblock %}

{% block content %}
<section class="content-card">
    <form method="post" class="form-panel" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-row">
            <button type="submit" class="btn btn-primary">Create Appointment</button>
        </div>
    </form>
</section>
{% endblock %}

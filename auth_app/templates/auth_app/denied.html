{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
  <div class="max-w-2xl mx-auto mt-12 p-6 bg-white rounded shadow">
    <h1 class="text-2xl font-semibold mb-4">Access Denied</h1>
    <p class="mb-4">You do not have permission to access this page.</p>
    {% if user.is_authenticated %}
      <p class="mb-4">Signed in as {{ user.get_username }}.</p>
    {% endif %}
    <a href="{% url 'auth_app:login' %}" class="btn">Return to login</a>
  </div>
{% endblock %}

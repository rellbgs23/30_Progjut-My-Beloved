{% extends "base.html" %}

{% block title %}Edit Profile - MediCore HIS{% endblock %}

{% block page_header %}
<section class="page-header">
    <p class="eyebrow">Patient Portal</p>
    <h1 class="page-title">Edit Profile</h1>
    <p class="page-subtitle">MRN: <strong>{{ patient.mrn }}</strong></p>
</section>
{% endblock %}

{% block content %}
<section class="content-card">
    <form method="post" class="form-panel" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-row">
            <button type="submit" class="btn btn-primary">Save Profile</button>
            <a class="btn btn-ghost" href="{% url 'core_app:patient_dashboard' %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}

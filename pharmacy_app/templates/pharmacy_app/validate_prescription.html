<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validate Prescription</title>
  <style>
    :root {
      --bg: #f4f8f9;
      --surface: #ffffff;
      --line: #d6e3e8;
      --text: #112a33;
      --text-muted: #4c6670;
      --warning: #b45309;
      --warning-strong: #92400e;
      --neutral: #52636d;
      --neutral-strong: #3d4b53;
      --shadow: 0 18px 36px rgba(17, 42, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% -10%, #fde68a 0%, rgba(253, 230, 138, 0) 38%),
        radial-gradient(circle at 95% -10%, #bae6fd 0%, rgba(186, 230, 253, 0) 34%),
        var(--bg);
    }

    .card {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      background: var(--surface);
      padding: 1.3rem;
    }

    h1 {
      margin: 0 0 0.45rem;
      font-size: clamp(1.3rem, 2.4vw, 1.8rem);
    }

    .desc {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .meta {
      margin-top: 1rem;
      background: #fffdf8;
      border: 1px solid #fde68a;
      border-radius: 14px;
      padding: 0.9rem;
      display: grid;
      gap: 0.45rem;
    }

    .meta p {
      margin: 0;
      word-break: break-word;
      font-size: 0.94rem;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      color: #fff;
      transition: background 160ms ease;
    }

    .btn-warning {
      background: var(--warning);
    }

    .btn-warning:hover,
    .btn-warning:focus-visible {
      background: var(--warning-strong);
    }

    .btn-neutral {
      background: var(--neutral);
    }

    .btn-neutral:hover,
    .btn-neutral:focus-visible {
      background: var(--neutral-strong);
    }

    @media (max-width: 520px) {
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="validate-title">
    <h1 id="validate-title">Validate Prescription</h1>
    <p class="desc">Confirm integrity verification before changing prescription status.</p>

    <section class="meta" aria-label="Prescription summary">
      <p><strong>Prescription:</strong> {{ prescription.id }}</p>
      <p><strong>Status:</strong> {{ prescription.status }}</p>
    </section>

    <form method="post" aria-label="Validate prescription form">
      {% csrf_token %}
      <div class="actions">
        <button class="btn btn-warning" type="submit">Validate</button>
        <a class="btn btn-neutral" href="{% url 'pharmacy_app:prescription_detail' prescription.id %}">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>

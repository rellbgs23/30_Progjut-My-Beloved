{% extends "base.html" %}

{% block title %}Create Appointment - MediCore HIS{% endblock %}

{% block page_header %}
<section class="page-header">
    <p class="eyebrow">Registration</p>
    <h1 class="page-title">Create Appointment</h1>
    <p class="page-subtitle">Schedule a patient visit with an assigned doctor.</p>
</section>
{% endblock %}

{% block content %}
<section class="content-card">
    <form method="post" class="form-panel" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-row">
            <button type="submit" class="btn btn-primary">Create Appointment</button>
            <a class="btn btn-ghost" href="{% url 'landing_page' %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}

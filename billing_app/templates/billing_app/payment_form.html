<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Process Payment — MediCore HIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      :root {
        --navy: #0b1f3a;
        --teal: #0d7377;
        --teal-light: #14a085;
        --teal-pale: #e8f5f5;
        --surface: #f8fafb;
        --muted: #7a8a9a;
        --border: #d6dde6;
        --border-soft: #edf1f5;
        --text: #1a2a3a;
        --error-bg: #fff0f0;
        --error-text: #b03030;
        --success-bg: #e6f7f1;
        --success-text: #1a7a52;
        --shadow-md: 0 8px 32px rgba(11, 31, 58, 0.11);
      }
      
      html,
      body {
        min-height: 100%;
      }
      
      body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--surface);
        color: var(--text);
        line-height: 1.6;
      }
      
      .topbar {
        background: var(--navy);
        padding: 0 32px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 12px rgba(11, 31, 58, 0.25);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      
      .topbar-icon {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 10px rgba(13, 115, 119, 0.4);
      }
      
      .topbar-icon svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: #fff;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      
      .topbar-name {
        font-family: 'Crimson Pro', Georgia, serif;
        font-size: 1.2rem;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.01em;
      }
      
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .topbar-user-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 5px 14px 5px 8px;
      }
      
      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 500;
        color: #fff;
        text-transform: uppercase;
      }
      
      .topbar-username {
        font-size: 0.825rem;
        color: rgba(255, 255, 255, 0.75);
        font-weight: 400;
      }
      
      .page-wrapper {
        max-width: 580px;
        margin: 0 auto;
        padding: 44px 24px 60px;
        animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .page-title {
        font-family: 'Crimson Pro', Georgia, serif;
        font-size: 2rem;
        font-weight: 600;
        color: var(--navy);
        margin-bottom: 4px;
      }
      .page-subtitle {
        font-size: 0.875rem;
        color: var(--muted);
        font-weight: 300;
        margin-bottom: 32px;
      }
      
      .card {
        background: #fff;
        border-radius: 18px;
        border: 1px solid var(--border-soft);
        box-shadow: var(--shadow-md);
        overflow: hidden;
        margin-bottom: 20px;
      }
      
      .card-label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 24px 14px;
        border-bottom: 1px solid var(--border-soft);
      }
      
      .card-label-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--teal-pale);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .card-label-icon svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: var(--teal);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .card-label-text {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      
      .form-content {
        padding: 24px 24px 32px;
      }
      
      .messages {
        margin-bottom: 22px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .messages p {
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.85rem;
        font-weight: 400;
        line-height: 1.45;
      }
      .messages p.error {
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid rgba(176, 48, 48, 0.18);
        border-left: 3px solid var(--error-text);
      }
      .messages p.success {
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid rgba(26, 122, 82, 0.18);
        border-left: 3px solid var(--success-text);
      }
      
      .payment-form p {
        margin-bottom: 18px;
      }
      .payment-form label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--navy);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      
      .payment-form input[type='number'],
      .payment-form select {
        width: 100%;
        padding: 11px 15px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.925rem;
        color: var(--navy);
        background: #fff;
        transition: border-color 0.18s, box-shadow 0.18s;
        outline: none;
        appearance: none;
      }
      
      .payment-form select {
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237a8a9a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
      }
      
      .payment-form input:focus,
      .payment-form select:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(13, 115, 119, 0.12);
      }
      
      .payment-form ul.errorlist {
        list-style: none;
        margin: 6px 0 0;
      }
      .payment-form ul.errorlist li {
        font-size: 0.8rem;
        color: var(--error-text);
      }
      
      .btn-primary {
        display: block;
        width: 100%;
        padding: 13px 20px;
        margin-top: 24px;
        background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.925rem;
        font-weight: 500;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
        box-shadow: 0 4px 16px rgba(13, 115, 119, 0.35);
      }
      .btn-primary:hover {
        opacity: 0.92;
        transform: translateY(-1px);
        box-shadow: 0 6px 22px rgba(13, 115, 119, 0.45);
      }
      .btn-primary:active {
        transform: translateY(0);
        opacity: 1;
      }
      
      @media (max-width: 600px) {
        .topbar {
          padding: 0 18px;
        }
        .page-wrapper {
          padding: 28px 16px 48px;
        }
        .page-title {
          font-size: 1.65rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar" role="banner">
      <a class="topbar-brand" href="#" aria-label="MediCore Hospital System">
        <div class="topbar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="20" rx="1.5" fill="white" stroke="none" />
            <rect x="2" y="9" width="20" height="6" rx="1.5" fill="white" stroke="none" />
          </svg>
        </div>
        <span class="topbar-name">MediCore</span>
      </a>

      <div class="topbar-right">
        <div class="topbar-user-pill" aria-label="Logged in as {{ request.user.username }}">
          <div class="avatar" aria-hidden="true">{{ request.user.username|slice:':2' }}</div>
          <span class="topbar-username">{{ request.user.username }}</span>
        </div>
      </div>
    </header>

    <main class="page-wrapper" role="main">
      <h1 class="page-title">Payment Entry</h1>
      <p class="page-subtitle">Process and validate patient invoice payments.</p>

      <div class="card" role="region" aria-label="Payment Form">
        <div class="card-label">
          <div class="card-label-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
          </div>
          <span class="card-label-text">Transaction Details</span>
        </div>

        <div class="form-content">
          {% if messages %}
            <div class="messages" role="alert" aria-live="polite">
              {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}

          <form method="POST" class="payment-form" novalidate>
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn-primary">Process Payment</button>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
